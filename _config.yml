# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Carlo Leonardi
email: 
description: Computational Immunology, AI, Computational Biology
twitter_username: CarloLeonardi7
github_username: carloelle
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: benbalter/retlab
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: GMT

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Carlo Leonardi"
  avatar : "/assets/images/IMG_6834_new.jpg"
  bio    : "Bioinformatics, Data Science, AI"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url:  "mailto:c.leonardi95@protonmail.com"
    - label: "X"
      icon: "fa-brands fa-x-twitter"
      url: "https://x.com/CarloLeonardi7"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/carloelle"
    - label: "Google Scholar"
      icon: "ai ai-google-scholar"
      url: "https://scholar.google.com/citations?user=K723OxUAAAAJ&hl=en"

footer:
  links:
    - label: "X"
      icon: "fa-brands fa-x-twitter"
      url: "https://x.com/CarloLeonardi7"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url:  "https://github.com/carloelle"
    - label: "Google Scholar"
      icon: "ai ai-google-scholar"
      url: "https://scholar.google.com/citations?user=K723OxUAAAAJ&hl=en"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
