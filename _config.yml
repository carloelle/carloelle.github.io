title: "Carlo Leonardi"
description: "Computational Immunology, AI, Computational Biology"
email: "c.leonardi95@protonmail.com"
lang: en-GB

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-avatar
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-sitemap
  - jemoji
  - jekyll-paginate

remote_theme: benbalter/retlab
branch: master
nav_pages:
  - index.html
  - _pages/about.md
footer_pages:
  - _pages/fine-print.md

contact_links:
  - name: Email
    url: "mailto:c.leonardi95@protonmail.com"
    icon: envelope
  - name: GitHub
    url: "https://github.com/carloelle"
    icon: github
  - name: X
    url: "https://x.com/CarloLeonardi7"
    icon: twitter
  - name: Google Scholar
    url: "https://scholar.google.com/citations?user=K723OxUAAAAJ&hl=en"
    icon: graduation-cap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      comments: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
      comments: false

exclude:
  - vendor/bundle/
  - node_modules/
  - js/
  - sass/
  - script/
  - prettier.config.js
  - "*.gem"
  - "*.gemspec"
  - "*.json"
  - "*.ts"

permalink: pretty
