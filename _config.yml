# Basic site info
title: "Carlo Leonardi"
description: "Computational Immunology, AI, Computational Biology"
email: "c.leonardi95@protonmail.com"
lang: en-GB

# Theme
remote_theme: benbalter/retlab

# URL / permalinks
permalink: pretty
timezone: Europe/London

# Where Jekyll should look for additional content
include:
  - _pages

# Navigation (these files must exist in your repo)
nav_pages:
  - index.html
  - _pages/about.md
  - _pages/research.md
  - _pages/publications.md
  - _pages/contact.md

# Footer links (these also need to exist)
footer_pages:
  - _pages/fine-print.md

# Contact / social links used by Retlab
contact_links:
  - name: Email
    url: "mailto:c.leonardi95@protonmail.com"
    icon: envelope
  - name: GitHub
    url: "https://github.com/carloelle"
    icon: github
  - name: X
    url: "https://x.com/CarloLeonardi7"
    icon: twitter
  - name: Google Scholar
    url: "https://scholar.google.com/citations?user=K723OxUAAAAJ&hl=en"
    icon: graduation-cap

# Front matter defaults – use layouts Retlab actually provides
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      comments: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
      comments: false

# Plugins (all compatible with GitHub Pages)
plugins:
  - jekyll-seo-tag
  - jekyll-avatar
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-sitemap
  - jemoji
  - jekyll-paginate

# Things not to process
exclude:
  - vendor/bundle/
  - node_modules/
  - js/
  - sass/
  - script/
  - prettier.config.js
  - "*.gem"
  - "*.gemspec"
  - "*.json"
  - "*.ts"
