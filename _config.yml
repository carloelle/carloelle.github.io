# Basic site info
title: "Carlo Leonardi"
description: "Computational Immunology, AI, Computational Biology"
email: "c.leonardi95@protonmail.com"
lang: en-GB

# Use the Retlab theme from GitHub
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-avatar
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-sitemap
  - jemoji
  - jekyll-paginate

remote_theme: benbalter/retlab

# GitHub branch name for this site (your repo uses "master")
branch: master

# Pages to include in the top navigation
nav_pages:
  - index.html
  - _pages/about.md

# Pages to link in the footer (optional, create this file later if you like)
footer_pages:
  - _pages/fine-print.md

# Social / contact links (used by Retlab)
contact_links:
  - name: Email
    url: "mailto:c.leonardi95@protonmail.com"
    icon: envelope
  - name: GitHub
    url: "https://github.com/carloelle"
    icon: github
  - name: X
    url: "https://x.com/CarloLeonardi7"
    icon: twitter
  - name: Google Scholar
    url: "https://scholar.google.com/citations?user=K723OxUAAAAJ&hl=en"
    icon: graduation-cap

# Front matter defaults – layouts that Retlab actually provides
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      comments: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
      comments: false

# Exclude from build
exclude:
  - vendor/bundle/
  - node_modules/
  - js/
  - sass/
  - script/
  - prettier.config.js
  - "*.gem"
  - "*.gemspec"
  - "*.json"
  - "*.ts"

# Pretty URLs for posts/pages
permalink: pretty
